name = "bmore-demo"
main = "src/index.ts"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Workers settings
workers_dev = true

# D1 Database
# 1. Run: wrangler d1 create bmore-db
# 2. Paste the database_id below
[[d1_databases]]
binding = "DB"
database_name = "bmore-db"
database_id = "YOUR_DATABASE_ID_HERE"
migrations_dir = "./node_modules/@sonicjs-cms/core/migrations"

# KV Namespace for caching (required by SonicJS)
# For remote deployment: wrangler kv namespace create CACHE_KV
# Then paste the id below
[[kv_namespaces]]
binding = "CACHE_KV"
id = "YOUR_KV_NAMESPACE_ID_HERE"

# R2 Bucket for media storage (needed for admin image uploads)
# Bucket was created via: wrangler r2 bucket create bmore-media
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "bmore-media"

# Environment variables
[vars]
ENVIRONMENT = "development"
# R2 public bucket URL hash — after creating the bucket and enabling public access
# in the Cloudflare dashboard, copy the hash from the R2.dev URL they give you
# e.g. if your public URL is https://pub-abc123.r2.dev then set: BUCKET_NAME = "abc123"
BUCKET_NAME = "bmore-media"

# Observability (optional)
[observability]
enabled = true

# ── Preview environment ──
[env.preview]
workers_dev = true

[env.preview.vars]
ENVIRONMENT = "preview"

# ── Production environment ──
[env.production]
workers_dev = false
# Uncomment and set your domain when ready:
# routes = [{ pattern = "yourdomain.com/*", zone_name = "yourdomain.com" }]

[env.production.vars]
ENVIRONMENT = "production"
